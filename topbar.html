<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Header</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="frame-doc dark">

<div class="topbar">
  <a href="catalog.html" target="mainFrame" class="brand">
    <img src="NALGYA/gambarcodding.jpeg" alt="NALGYA FASHION" class="brand__logo">
    <span>
        NALGYA FASHION
        <small>fashion wanita</small>
    </span>

  </a>

    <div class="topbar__search">

    <label class="search-label" for="searchBox">
        Cari
    </label>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"/>
        <path d="M21 21l-4.35-4.35"/>
    </svg>

    <input
        id="searchBox"
        type="text"
        data-search
        placeholder="Nama produk...">

</div>

  <div class="topbar__actions">
    <nav class="topbar__nav">
      <a href="catalog.html" target="mainFrame">Katalog</a>
      <a href="checkout.html" target="_top">Keranjang</a>
    </nav>
    <a href="checkout.html" target="_top" class="cart-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6L4 2H1"/><circle cx="9" cy="20" r="1.4"/><circle cx="17" cy="20" r="1.4"/></svg>
      Keranjang
      <span class="cart-badge" data-cart-badge>0</span>
    </a>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
